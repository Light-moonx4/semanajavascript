<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-App de Notas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Mis Notas</h2>
    <p>Escribe una nota y presiona "Agregar" para guardarla.</p>

    <div class="input-contenedor">
        <input type="text" id="inputNota" placeholder="Escribe una nota aquí...">
        <button id="btnAgregar" class="btn-principal">Agregar</button>
    </div>

    <ul id="listaNotas"></ul>

    <script src="script.js"></script>
</body>
</html>
